<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NICO GYM OS v85 - Barcelona</title>
    <link rel="manifest" href="data:application/manifest+json,{
        \"name\": \"NICO GYM\",
        \"short_name\": \"NICOGYM\",
        \"start_url\": \".\",
        \"display\": \"standalone\",
        \"theme_color\": \"#ff6600\",
        \"background_color\": \"#000000\",
        \"icons\": [{
            \"src\": \"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23ff6600'/%3E%3Ctext x='50' y='68' font-size='50' text-anchor='middle' fill='white'%3E🏋️%3C/text%3E%3C/svg%3E\",
            \"sizes\": \"any\"
        }]
    }">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        function hacerConfeti() {
            try {
                if (typeof canvasConfetti !== 'undefined') {
                    canvasConfetti({ particleCount: 300, spread: 100, origin: { y: 0.6 }, startVelocity: 25 });
                    setTimeout(() => {
                        if (typeof canvasConfetti !== 'undefined') {
                            canvasConfetti({ particleCount: 150, spread: 70, origin: { y: 0.5, x: 0.2 }, startVelocity: 20 });
                        }
                    }, 150);
                    setTimeout(() => {
                        if (typeof canvasConfetti !== 'undefined') {
                            canvasConfetti({ particleCount: 150, spread: 70, origin: { y: 0.5, x: 0.8 }, startVelocity: 20 });
                        }
                    }, 300);
                }
            } catch(e) {}
        }
    </script>
    <style>
        :root { 
            --bg: #000; 
            --card: #111; 
            --primary: #ff6600; 
            --text: #fff; 
            --accent: #32d74b; 
            --danger: #ff3b30;
            --menu-bg: #0a0a0a;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding-bottom: 80px; }
        
        header { 
            height: 60px; 
            background: linear-gradient(135deg, #000 0%, #1a1a1a 100%);
            border-bottom: 2px solid var(--primary); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 0 15px; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
        }
        .logo {
            font-weight: 900;
            background: linear-gradient(135deg, #fff 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 1.3rem;
        }
        
        #menu-lat { 
            position: fixed; 
            left: -100%; 
            top: 0; 
            width: 280px; 
            height: 100%; 
            background: var(--menu-bg); 
            transition: 0.3s ease; 
            z-index: 2000; 
            border-right: 2px solid var(--primary); 
            overflow-y: auto; 
            box-shadow: 2px 0 20px rgba(0,0,0,0.8);
        }
        #menu-lat.open { left: 0; }
        #overlay { 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.85); 
            display: none; 
            z-index: 1500; 
            backdrop-filter: blur(3px);
        }
        
        .nav-btn { 
            padding: 18px; 
            border-bottom: 1px solid #222; 
            color: #fff; 
            display: block; 
            font-weight: bold; 
            text-decoration: none; 
            cursor: pointer; 
            transition: 0.2s;
        }
        .nav-btn:hover { background: #1a1a1a; padding-left: 25px; }
        
        .submenu-btn {
            background: #0f0f0f;
            cursor: pointer;
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px;
            border-bottom: 1px solid #222;
            font-weight: bold;
        }
        .submenu-btn span:first-child { flex: 1; }
        .submenu-btn .arrow {
            transition: 0.3s;
            font-size: 0.8rem;
        }
        .submenu-btn.open .arrow {
            transform: rotate(180deg);
        }
        .submenu-items {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            background: #050505;
        }
        .submenu-items.show {
            max-height: 400px;
        }
        .sub-link { 
            padding: 12px 35px; 
            color: #aaa; 
            font-size: 0.9rem; 
            border-bottom: 1px solid #111; 
            display: block; 
            cursor: pointer;
            transition: 0.2s;
        }
        .sub-link:hover { background: #1a1a1a; color: var(--primary); padding-left: 45px; }
        
        .debug-btn {
            margin-top: 30px;
            padding: 10px;
            background: transparent;
            color: #333;
            border: 1px solid #222;
            border-radius: 8px;
            font-size: 0.7rem;
            cursor: pointer;
            text-align: center;
        }
        .debug-btn:hover {
            background: #1a1a1a;
            color: #666;
        }
        
        .notif-btn {
            margin-top: 10px;
            padding: 12px;
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
        }
        .notif-btn:hover { opacity: 0.9; }
        
        .seccion { display: none; padding: 15px; animation: fadeIn 0.3s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .card { 
            background: var(--card); 
            border-radius: 12px; 
            padding: 15px; 
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(255,102,0,0.15);
            transition: transform 0.2s;
        }
        .card:active { transform: scale(0.98); }
        
        .stats-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .stat-card {
            flex: 1;
            background: var(--card);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(255,102,0,0.15);
            min-width: 100px;
        }
        .stat-card h2 {
            font-size: 1.3rem;
            font-weight: bold;
        }
        .stat-card small {
            font-size: 0.7rem;
            color: #aaa;
        }
        .stat-card.progreso h2 { color: var(--primary); }
        .stat-card.racha h2 { color: var(--primary); }
        .stat-card.nosmoke h2 { color: #66bb6a; }
        .stat-card.nosmoke small { color: #66bb6a; font-size: 0.65rem; }
        
        .ex-title { font-weight: bold; color: var(--primary); font-size: 1.1rem; display: block; }
        .ex-reps { color: var(--accent); font-weight: bold; font-size: 0.9rem; }
        
        .ex-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .calc-icon {
            background: var(--primary);
            color: #000;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .calc-icon:hover { transform: scale(1.05); background: #ff884d; }
        
        .descanso-icon {
            background: #2e7d32;
            color: #fff;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .descanso-icon:hover { transform: scale(1.05); background: #43a047; }
        
        .calc-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1a1a1a;
            border: 2px solid var(--primary);
            border-radius: 15px;
            padding: 20px;
            z-index: 4000;
            width: 90%;
            max-width: 320px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        .calc-modal.show { display: block; }
        .calc-modal h3 { color: var(--primary); margin-bottom: 15px; text-align: center; }
        .calc-modal .close-calc {
            position: absolute;
            top: 10px;
            right: 15px;
            cursor: pointer;
            font-size: 1.5rem;
            color: #aaa;
        }
        
        .descanso-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1a1a1a;
            border: 2px solid var(--accent);
            border-radius: 15px;
            padding: 25px;
            z-index: 4000;
            width: 90%;
            max-width: 300px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        .descanso-modal.show { display: block; }
        .descanso-modal h3 { color: var(--accent); margin-bottom: 15px; }
        .descanso-tiempos {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .tiempo-btn {
            background: #333;
            border: none;
            color: #fff;
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .tiempo-btn:hover { background: var(--accent); transform: scale(1.05); }
        .descanso-cerrar {
            margin-top: 15px;
            background: #222;
            color: #aaa;
            border: none;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .detalles { display: none; background: #050505; padding: 10px; border-radius: 8px; margin-top: 10px; border-left: 3px solid var(--primary); }
        .detalles.show { display: block; }
        
        .ex-img { 
            width: 100%; 
            max-width: 200px;
            height: auto;
            border-radius: 8px; 
            margin: 10px auto; 
            border: 1px solid #333; 
            display: block;
        }
        
        .btn-main { 
            width: 100%; 
            padding: 12px; 
            background: #222; 
            color: var(--primary); 
            border: 1px solid var(--primary); 
            border-radius: 8px; 
            font-weight: bold; 
            margin: 10px 0; 
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-main:hover { background: var(--primary); color: #000; }
        
        .check-box { 
            width: 35px; 
            height: 35px; 
            accent-color: var(--accent);
            transform: scale(1.1);
            cursor: pointer;
        }
        .input-nota { 
            width: 100%; 
            padding: 10px; 
            background: #000; 
            border: 1px solid #333; 
            color: #fff; 
            margin-top: 8px; 
            border-radius: 6px;
            font-size: 0.9rem;
        }
        .input-nota:focus { outline: none; border-color: var(--primary); }
        
        .peso-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #222; }
        .btn-del { background: none; border: none; color: var(--danger); font-size: 1.2rem; cursor: pointer; padding: 5px; }
        
        .calc-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 15px 0; }
        .calc-btn { 
            background: #333; 
            border: none; 
            color: #fff; 
            padding: 12px 0; 
            border-radius: 8px; 
            font-size: 0.9rem; 
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
        }
        .calc-btn:hover { background: var(--primary); }
        .badge { 
            position: absolute; 
            top: -8px; 
            right: -5px; 
            background: var(--primary); 
            font-size: 0.8rem; 
            padding: 2px 8px; 
            border-radius: 20px;
            font-weight: bold;
        }
        .calc-reset {
            width: 100%;
            padding: 10px;
            background: #222;
            color: var(--danger);
            border: 1px solid var(--danger);
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }
        
        #timer-box { 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.95); 
            z-index: 3000; 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            backdrop-filter: blur(10px);
        }
        
        #descanso-box {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 3500;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }
        .descanso-timer-num {
            font-size: 8rem;
            color: var(--accent);
            font-weight: bold;
            font-family: monospace;
        }
        
        #float-t { 
            position: fixed; 
            bottom: 20px; 
            right: 20px; 
            width: 60px; 
            height: 60px; 
            background: linear-gradient(135deg, var(--primary), #ff884d);
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            z-index: 900; 
            font-size: 1.5rem; 
            border: none; 
            color: white; 
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255,102,0,0.4);
        }
        
        .today-card {
            background: linear-gradient(135deg, #1a1a1a, #0a0a0a);
            border: 2px solid var(--primary);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }
        .today-card:hover { transform: translateY(-3px); box-shadow: 0 5px 20px rgba(255,102,0,0.3); }
        .today-day { font-size: 1.5rem; font-weight: bold; color: var(--primary); margin-bottom: 8px; }
        .today-routine { font-size: 1rem; color: #ccc; margin-bottom: 10px; }
        .today-btn { background: var(--primary); color: #000; padding: 8px 20px; border-radius: 20px; display: inline-block; font-weight: bold; margin-top: 8px; }
        
        .sunday-card {
            background: linear-gradient(135deg, #1a0a2e, #0a0a1a);
            border: 2px solid #8b5cf6;
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            margin-top: 30px;
        }
        .sunday-emoji { font-size: 5rem; animation: float 3s ease-in-out infinite; }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }
        .sunday-title { font-size: 2rem; color: #8b5cf6; margin: 20px 0; font-weight: bold; }
        .sunday-text { color: #aaa; font-size: 1.1rem; }
        .sunday-tips { background: rgba(139,92,246,0.1); border-radius: 15px; padding: 20px; margin-top: 20px; }
        
        .toast-msg {
            position: fixed;
            bottom: 100px;
            left: 20px;
            right: 20px;
            background: var(--primary);
            color: #000;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
            z-index: 5000;
            animation: fadeInOut 3s ease-in-out;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(20px); }
            15% { opacity: 1; transform: translateY(0); }
            85% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-20px); }
        }
        
        .notif-config {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .notif-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #333;
        }
        .notif-item:last-child { border-bottom: none; }
        .notif-label { font-size: 0.85rem; }
        .toggle-switch {
            width: 50px;
            height: 24px;
            background: #333;
            border-radius: 12px;
            position: relative;
            cursor: pointer;
            transition: 0.2s;
        }
        .toggle-switch.active {
            background: var(--accent);
        }
        .toggle-switch::after {
            content: "";
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 10px;
            position: absolute;
            top: 2px;
            left: 3px;
            transition: 0.2s;
        }
        .toggle-switch.active::after {
            left: 27px;
        }
    </style>
</head>
<body>

<div id="overlay" onclick="closeMenu()"></div>

<nav id="menu-lat">

        <span class="arrow">▼</span>

<header>
    <div onclick="openMenu()" style="font-size:1.8rem; cursor:pointer">☰</div>
    <div class="logo">NICO <span style="color:var(--primary)">GYM</span> v85</div>
    <div onclick="go('home')" style="font-size:1.5rem; cursor:pointer">🏠</div>

<div id="home" class="seccion active">
    <div class="today-card" id="todayCard" onclick="goTodayRoutine()">
        <div class="today-day" id="todayDay">Cargando...</div>
        <div class="today-routine" id="todayRoutine">...</div>
        <div class="today-btn">👉 ENTRENAR HOY 👈</div>
    </div>
    
    <div class="stats-row">
        <div c
